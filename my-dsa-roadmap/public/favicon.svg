<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background - dark navy -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Grid dots background -->
  <circle cx="20" cy="20" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="35" cy="20" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="50" cy="20" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="65" cy="20" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="80" cy="20" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="20" cy="35" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="80" cy="35" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="20" cy="50" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="80" cy="50" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="20" cy="65" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="80" cy="65" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="20" cy="80" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="35" cy="80" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="50" cy="80" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="65" cy="80" r="1.2" fill="white" opacity="0.12"/>
  <circle cx="80" cy="80" r="1.2" fill="white" opacity="0.12"/>

  <!-- Tree edges -->
  <!-- Root to children -->
  <line x1="50" y1="26" x2="28" y2="48" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="50" y1="26" x2="72" y2="48" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <!-- Left child to its children -->
  <line x1="28" y1="48" x2="18" y2="68" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="28" y1="48" x2="38" y2="68" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Right child to its children -->
  <line x1="72" y1="48" x2="62" y2="68" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="72" y1="48" x2="82" y2="68" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- ROOT node - orange/red gradient -->
  <circle cx="50" cy="24" r="9" fill="url(#node)"/>
  <text x="50" y="28" font-family="monospace" font-size="8" font-weight="900"
        fill="white" text-anchor="middle">{'}'}</text>

  <!-- Level 2 nodes - cyan -->
  <circle cx="28" cy="48" r="8" fill="#0ea5e9"/>
  <text x="28" y="52" font-family="monospace" font-size="7" font-weight="700"
        fill="white" text-anchor="middle">[]</text>

  <circle cx="72" cy="48" r="8" fill="#0ea5e9"/>
  <text x="72" y="52" font-family="monospace" font-size="6.5" font-weight="700"
        fill="white" text-anchor="middle">{}</text>

  <!-- Level 3 nodes - smaller, green tones -->
  <circle cx="18" cy="68" r="6" fill="#22c55e" opacity="0.9"/>
  <text x="18" y="72" font-family="monospace" font-size="5.5" font-weight="700"
        fill="white" text-anchor="middle">O1</text>

  <circle cx="38" cy="68" r="6" fill="#22c55e" opacity="0.9"/>
  <text x="38" y="72" font-family="monospace" font-size="5" font-weight="700"
        fill="white" text-anchor="middle">On</text>

  <circle cx="62" cy="68" r="6" fill="#a78bfa" opacity="0.9"/>
  <text x="62" y="72" font-family="monospace" font-size="4.5" font-weight="700"
        fill="white" text-anchor="middle">lgn</text>

  <circle cx="82" cy="68" r="6" fill="#a78bfa" opacity="0.9"/>
  <text x="82" y="72" font-family="monospace" font-size="5" font-weight="700"
        fill="white" text-anchor="middle">n²</text>

  <!-- Progress bar at bottom -->
  <rect x="16" y="82" width="68" height="6" rx="3" fill="white" opacity="0.12"/>
  <rect x="16" y="82" width="48" height="6" rx="3" fill="#f97316" opacity="0.9"/>
  <!-- Progress dots -->
  <circle cx="64" cy="85" r="2" fill="white" opacity="0.5"/>
  <circle cx="72" cy="85" r="2" fill="white" opacity="0.3"/>
  <circle cx="80" cy="85" r="2" fill="white" opacity="0.15"/>
</svg>